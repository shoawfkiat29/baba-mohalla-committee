<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#065f46" />
  <title>Baba Mohalla Committee</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20260715a" />
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <div class="login-logo">🕌</div>
      <h1>Baba Mohalla Committee</h1>
      <p class="muted">Choose how you'd like to continue.</p>
      <p class="form-error hidden" id="setup-notice"></p>

      <button id="btn-show-admin-login" class="btn-primary full-width">Login as Admin</button>
      <button id="btn-viewer-login" class="btn-secondary full-width">Continue as Viewer</button>

      <form id="admin-login-form" class="hidden">
        <label>Email
          <input type="email" id="admin-email" autocomplete="username" required />
        </label>
        <label>Password
          <input type="password" id="admin-password" autocomplete="current-password" required />
        </label>
        <div class="modal-actions">
          <button type="button" id="btn-admin-cancel" class="btn-secondary">Cancel</button>
          <button type="submit" id="btn-admin-submit" class="btn-primary">Login</button>
        </div>
      </form>
      <p class="form-error" id="login-error"></p>
      <p class="muted small">Viewers can see everything but cannot change anything. Admin login is required to add families or record payments.</p>
    </div>
  </div>

  <!-- Main app -->
  <div id="app-screen" class="screen hidden">
    <header class="app-header">
      <div class="app-title">
        <span id="app-committee-name">Baba Mohalla Committee</span>
        <span id="app-role-badge" class="role-badge"></span>
      </div>
      <nav class="app-nav">
        <button id="tab-dashboard" class="nav-tab">Dashboard</button>
        <button id="tab-families" class="nav-tab">Families</button>
        <button id="tab-expenses" class="nav-tab">Expenses</button>
        <button id="tab-settings" class="nav-tab hidden">Settings</button>
        <button id="btn-logout" class="nav-tab logout">Logout</button>
      </nav>
    </header>

    <main class="app-main">
      <section id="page-dashboard" class="page"></section>
      <section id="page-families" class="page hidden"></section>
      <section id="page-family-detail" class="page hidden"></section>
      <section id="page-expenses" class="page hidden"></section>
      <section id="page-settings" class="page hidden"></section>
    </main>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-content"></div>
  </div>

  <script src="js/firebase-config.js?v=20260715a"></script>
  <script type="module" src="js/firebase.js?v=20260715a"></script>
  <script src="js/utils.js?v=20260715a"></script>
  <script src="js/storage.js?v=20260715a"></script>
  <script src="js/auth.js?v=20260715a"></script>
  <script src="js/families.js?v=20260715a"></script>
  <script src="js/payments.js?v=20260715a"></script>
  <script src="js/expenses.js?v=20260715a"></script>
  <script src="js/whatsapp.js?v=20260715a"></script>
  <script src="js/app.js?v=20260715a"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>
